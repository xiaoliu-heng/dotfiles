# Modern tmux defaults
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"
set -g focus-events on
set -g escape-time 10
set -g history-limit 100000
set -g set-clipboard on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on

# Mouse and copy mode
set -g mouse on
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Prefix and reload
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Splits keep the current directory.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation and resizing
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Popups
bind t display-popup -E -w 80% -h 70% -d "#{pane_current_path}" "$SHELL"
bind g display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "$HOME/.local/bin/lazygit"

# A clean, modern theme without external plugins.
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#16161e,fg=#c0caf5"
set -g status-left-length 80
set -g status-right-length 120
set -g status-left "#[bg=#7aa2f7,fg=#11111b,bold] #S #[bg=#24283b,fg=#7aa2f7]#[bg=#24283b,fg=#c0caf5] #{?client_prefix,#[fg=#f7768e]PREFIX#[fg=#c0caf5],#(whoami)} #[bg=#16161e,fg=#24283b]"
set -g status-right "#[fg=#414868]#[bg=#414868,fg=#c0caf5] %Y-%m-%d #[fg=#7aa2f7]#[bg=#7aa2f7,fg=#11111b,bold] %H:%M "
setw -g window-status-separator ""
setw -g window-status-format "#[bg=#16161e,fg=#565f89] #I:#W "
setw -g window-status-current-format "#[bg=#bb9af7,fg=#11111b,bold] #I:#W #[bg=#16161e,fg=#bb9af7]"

# Pane borders
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g display-panes-colour "#7aa2f7"
set -g display-panes-active-colour "#f7768e"

# Messages and command prompt
set -g message-style "bg=#7aa2f7,fg=#11111b,bold"
set -g message-command-style "bg=#24283b,fg=#c0caf5"
set -g mode-style "bg=#7aa2f7,fg=#11111b,bold"
